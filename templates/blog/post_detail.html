{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'blog:post_list' %}">Blog</a></li>
                    <li class="breadcrumb-item active">{{ post.title }}</li>
                </ol>
            </nav>

            <h1 class="display-4 fw-bold">{{ post.title }}</h1>
            <p class="text-muted">
                By <strong>{{ post.author.username }}</strong> |
                Published on {{ post.created_at|date:"F d, Y" }}
            </p>
            <hr>

            {% if post.image %}
            <img src="{{ post.image.url }}" class="img-fluid rounded mb-4" alt="{{ post.title }}"
                style="width: 100%; max-height: 400px; object-fit: cover;">
            {% endif %}

            <div class="blog-content leading-relaxed" style="font-size: 1.1rem; line-height: 1.8;">
                {{ post.body|linebreaks }}
            </div>

            <hr class="mt-5">
            <a href="{% url 'blog:post_list' %}" class="btn btn-outline-primary mb-5">← Back to Blog</a>
        </div>
    </div>
</div>
{% endblock %}
